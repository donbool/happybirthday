  <rect x="40" y="26" width="8" height="348" fill="#8d2a55"/>
  <rect x="312" y="26" width="8" height="348" fill="#8d2a55"/>
  <rect x="328" y="26" width="8" height="348" fill="#8d2a55"/>
  <rect x="344" y="26" width="8" height="348" fill="#8d2a55"/>

  <!-- spotlight cones -->
  <polygon points="134,42 180,360 226,42" fill="url(#spot)"/>
  <polygon points="100,42 148,315 196,42" fill="url(#spotWarm)"/>
  <polygon points="164,42 212,315 260,42" fill="url(#spotWarm)"/>

