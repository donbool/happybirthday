<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 640" preserveAspectRatio="xMidYMid slice" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="backWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f2a"/>
      <stop offset="1" stop-color="#1a2356"/>
    </linearGradient>
    <linearGradient id="stageFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a336f"/>
      <stop offset="1" stop-color="#1a2252"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17214d"/>
      <stop offset="1" stop-color="#101739"/>
    </linearGradient>
    <linearGradient id="curtain" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#591133"/>
      <stop offset="1" stop-color="#7a1846"/>
    </linearGradient>
    <linearGradient id="spot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ce8ff" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#7ce8ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spotWarm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd96c" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#ffd96c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="360" height="640" fill="#070b1f"/>

  <rect x="0" y="0" width="360" height="342" fill="url(#backWall)"/>

  <!-- overhead rig -->
  <rect x="0" y="0" width="360" height="28" fill="#060913"/>
  <rect x="8" y="10" width="344" height="8" fill="#111833"/>
  <rect x="28" y="18" width="4" height="18" fill="#1d2959"/>
  <rect x="84" y="18" width="4" height="18" fill="#1d2959"/>
  <rect x="140" y="18" width="4" height="18" fill="#1d2959"/>
  <rect x="196" y="18" width="4" height="18" fill="#1d2959"/>
  <rect x="252" y="18" width="4" height="18" fill="#1d2959"/>
  <rect x="308" y="18" width="4" height="18" fill="#1d2959"/>

  <!-- rig lamps -->
  <rect x="22" y="34" width="14" height="10" fill="#ffe36d"/>
  <rect x="78" y="34" width="14" height="10" fill="#ff6ea5"/>
  <rect x="134" y="34" width="14" height="10" fill="#5fe3ff"/>
  <rect x="190" y="34" width="14" height="10" fill="#7fffab"/>
  <rect x="246" y="34" width="14" height="10" fill="#5fe3ff"/>
  <rect x="302" y="34" width="14" height="10" fill="#ffe36d"/>

  <!-- side curtains -->
  <rect x="0" y="26" width="56" height="348" fill="url(#curtain)"/>
  <rect x="304" y="26" width="56" height="348" fill="url(#curtain)"/>
  <rect x="8" y="26" width="8" height="348" fill="#8d2a55"/>
