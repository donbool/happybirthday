  <rect x="0" y="606" width="360" height="34" fill="#05070e"/>
  <rect x="8" y="594" width="24" height="22" fill="#080b16"/>
  <rect x="40" y="590" width="20" height="26" fill="#080b16"/>
  <rect x="68" y="596" width="18" height="20" fill="#080b16"/>
  <rect x="94" y="588" width="22" height="28" fill="#080b16"/>
  <rect x="124" y="594" width="20" height="22" fill="#080b16"/>
  <rect x="152" y="586" width="24" height="30" fill="#080b16"/>
  <rect x="184" y="594" width="20" height="22" fill="#080b16"/>
  <rect x="212" y="590" width="22" height="26" fill="#080b16"/>
  <rect x="242" y="596" width="18" height="20" fill="#080b16"/>
  <rect x="268" y="588" width="24" height="28" fill="#080b16"/>
  <rect x="300" y="594" width="22" height="22" fill="#080b16"/>
  <rect x="330" y="590" width="22" height="26" fill="#080b16"/>
