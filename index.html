<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0d20" />
  <title>sarah bday</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main id="stage" class="stage" aria-label="sarah bday">
    <div id="lights" class="stage__lights" aria-hidden="true"></div>
    <h1 id="headline" class="headline" aria-live="polite">happy birthday !!</h1>

    <div class="dancer-wrap" aria-live="polite">
      <img
        id="dancer"
        class="dancer"
        src="./assets/centerfacing.png"
        alt="Pixel dancer"
        width="487"
        height="512"
        decoding="async"
        draggable="false"
        hidden
      />
    </div>

    <p id="prompt" class="prompt">tap the stage</p>
    <p class="stage-note">big 2 4! go get lit today</p>
    <div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
  </main>

  <audio
    id="party-audio"
    preload="auto"
    src="./assets/Will%20Smith%20-%20Gettin%27%20Jiggy%20Wit%20It.mp4"
  ></audio>

  <script src="./app.js" defer></script>
</body>
</html>
